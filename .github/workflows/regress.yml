name: PG regression with pg_pathcheck

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

jobs:
  regress:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      PG_INSTALL: ${{ github.workspace }}/pg_install
      PGDATA: ${{ github.workspace }}/pgdata

    steps:
      - name: Check out pg_pathcheck
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            build-essential flex bison pkg-config perl \
            libipc-run-perl \
            libreadline-dev zlib1g-dev \
            libicu-dev \
            libssl-dev \
            liblz4-dev libzstd-dev \
            libxml2-dev libxslt1-dev \
            uuid-dev

      - name: Clone PostgreSQL master
        run: |
          git clone --depth=1 https://git.postgresql.org/git/postgresql.git pg_src

      - name: Configure PostgreSQL
        working-directory: pg_src
        run: |
          ./configure \
            --prefix=$PG_INSTALL \
            --enable-cassert \
            --enable-debug \
            --enable-injection-points \
            --with-icu \
            --with-openssl \
            --with-lz4 \
            --with-zstd \
            --with-libxml \
            --with-libxslt \
            --with-uuid=e2fs

      - name: Build and install PostgreSQL
        working-directory: pg_src
        run: |
          make -j$(nproc) -s
          make install -s

      - name: Add PG bin to PATH
        run: echo "$PG_INSTALL/bin" >> "$GITHUB_PATH"

      - name: Build and install pg_pathcheck
        id: build_ext
        run: |
          USE_PGXS=1 PG_CONFIG=$PG_INSTALL/bin/pg_config make install

      - name: Send email on extension build failure
        if: failure() && steps.build_ext.outcome == 'failure'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "pg_pathcheck failed to compile against PG master"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_FROM }}
          body: |
            pg_pathcheck failed to compile against current PostgreSQL master.

            This usually means an upstream API change broke the extension
            (e.g. a new Path type, changed struct layout, or renamed header).

            Repository: ${{ github.repository }}
            Branch:     ${{ github.ref_name }}
            Commit:     ${{ github.sha }}
            Run:        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger:    ${{ github.event_name }}

            Check the build log for details.

      - name: Initialise cluster
        run: |
          initdb -D $PGDATA --no-sync --locale=en_US.UTF-8
          echo "shared_preload_libraries = 'pg_pathcheck'" >> $PGDATA/postgresql.conf

      - name: Start server
        run: |
          pg_ctl -D $PGDATA -l $PGDATA/logfile start
          pg_isready -t 30

      - name: Run core regression tests
        working-directory: pg_src
        run: make -C src/test/regress installcheck

      - name: Summarise pg_pathcheck warnings
        if: always()
        run: |
          echo "### pg_pathcheck warnings" >> "$GITHUB_STEP_SUMMARY"
          if grep -c 'pg_pathcheck:' $PGDATA/logfile > /dev/null 2>&1; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep 'pg_pathcheck:' $PGDATA/logfile >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "None detected." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Stop server
        if: always()
        run: |
          pg_ctl -D $PGDATA stop -m fast || true

      - name: Upload artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-diffs
          path: |
            pg_src/src/test/regress/regression.diffs
            ${{ env.PGDATA }}/logfile
          retention-days: 14
